<html lang="hi">
<head>
    <meta charset="UTF-8">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ========================================== */
        /* GENERAL SCREEN STYLES (NO-PRINT) */
        /* ========================================== */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #000;
        }

        .action-bar {
            text-align: center;
            margin-bottom: 20px;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn-print {
            background: #ff2a75;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
            box-shadow: 0 4px 6px rgba(255, 42, 117, 0.3);
            text-transform: uppercase;
        }
        .btn-print:hover { background: #e60050; }

        /* ========================================== */
        /* A4 PAPER CONTAINER FOR SCREEN */
        /* ========================================== */
        .paper-container {
            max-width: 210mm;
            margin: 0 auto;
            background: #fff;
            padding: 15mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
        }

        /* Watermark (Fixed for both screen and print) */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.05); /* Very light */
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
        }

        /* ========================================== */
        /* EXAM CONTENT STYLES */
        /* ========================================== */
        .content-wrapper { position: relative; z-index: 10; }

        /* Header */
        .exam-header {
            text-align: center;
            border-bottom: 3px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .exam-header h1 { margin: 0; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        .exam-header h2 { margin: 8px 0; font-size: 18px; color: #222; font-weight: 800;}
        .exam-header p { margin: 10px 0 0 0; font-size: 13px; font-weight: bold; }

        /* Student Info Box */
        .student-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border: 2px solid #000;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        .info-field { border-bottom: 1px dashed #666; padding-bottom: 5px; }
        .full-width { grid-column: span 2; }

        /* Instructions */
        .instructions {
            border: 2px solid #000;
            padding: 10px 15px;
            margin-bottom: 25px;
            font-size: 13px;
            background: #fdfdfd;
        }
        .instructions ul { margin: 5px 0; padding-left: 20px; }

        /* Questions Container (2 Columns) */
        .questions-wrapper {
            column-count: 2;
            column-gap: 12mm;
            column-rule: 1px solid #ccc;
        }

        .section-title {
            background: #e0e0e0;
            padding: 6px;
            border: 1px solid #000;
            text-align: center;
            font-size: 14px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            font-weight: bold;
            column-span: all;
        }

        /* THE MAGIC FIX FOR CHROME PRINT CLIPPING */
        .question-block {
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.4;
            display: inline-block; /* Prevents column clipping */
            width: 100%;
            break-inside: avoid;
            page-break-inside: avoid; 
        }
        .q-text { font-weight: bold; margin-bottom: 6px; }
        .q-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-left: 15px;
        }

        /* Social Media Box (End of Questions) */
        .social-box {
            border: 2px solid #000;
            background: #f9f9f9;
            padding: 15px;
            margin-top: 30px;
            text-align: center;
            border-radius: 5px;
            break-inside: avoid;
            page-break-inside: avoid;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
        .social-box h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #000;
            text-transform: uppercase;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            font-weight: bold;
        }
        .social-links span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .fa-youtube { color: #ff0000; }
        .fa-telegram { color: #0088cc; }
        .fa-whatsapp { color: #25d366; }

        /* Answer Key Section */
        .answer-key-wrapper { margin-top: 40px; page-break-before: always; }
        .key-title { background: #000; color: #fff; padding: 10px; text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase;}
        .key-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            font-size: 13px;
        }
        .key-item { border: 1px solid #ccc; padding: 6px; text-align: center; }

        /* ========================================== */
        /* PRINT CSS (Only applies when printing) */
        /* ========================================== */
        @media print {
            @page { 
                size: A4; 
                margin: 15mm; 
                /* Adds border to every printed page */
                border: 2px solid #000; 
                /* Footer text at the bottom of every page */
                @bottom-center {
                    content: "EXAMEDGE ONLINE INSTITUTE";
                    font-family: Arial, sans-serif;
                    font-size: 10pt;
                    font-weight: bold;
                    letter-spacing: 2px;
                }
            }
            body { background-color: #fff; margin: 0; padding: 0; }
            .action-bar { display: none; }
            
            .paper-container { 
                box-shadow: none; margin: 0; 
                padding: 0; 
                max-width: 100%; width: 100%; min-height: auto;
            }

            .watermark { display: block; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); z-index: -1;}
            
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>

            </div>
            `;

            // 2. Questions (Inside 2-column wrapper)
            html += `<div class="questions-wrapper">`;
            let currentSec = '';
            qDB.forEach((q, i) => {
                if (q.sec !== currentSec) {
                    html += `<div class="section-title">PART: ${q.sec}</div>`;
                    currentSec = q.sec;
                }
                html += `
                <div class="question-block">
                    <div class="q-text">Q${i+1}. ${q.q}</div>
                    <div class="q-options">
                        <div>(A) ${q.opts[0]}</div>
                        <div>(B) ${q.opts[1]}</div>
                        <div>(C) ${q.opts[2]}</div>
                        <div>(D) ${q.opts[3]}</div>
                    </div>
                </div>`;
            });
            
            // 3. Social Media Box (Immediately after questions inside the flow)
            html += `
            <div class="social-box">
                <h3>📚 FOR VIDEO SOLUTIONS & FREE STUDY MATERIAL 📚</h3>
                <div class="social-links">
                    <span><i class="fab fa-youtube"></i> YouTube: @abhinaypratapmaths</span>
                    <span><i class="fab fa-telegram"></i> Telegram: @abhinaypratapmaths</span>
                    <span><i class="fab fa-whatsapp"></i> WhatsApp: AP Mathematics</span>
                </div>
            </div>
            `;
            html += `</div>`; // Close questions-wrapper

            // 4. Answer Key (New Page)
            const labels = ['A', 'B', 'C', 'D'];
            html += `
            <div class="answer-key-wrapper">
                <div class="key-title">ANSWER KEY (FOR TEACHERS ONLY)</div>
                <div class="key-grid">
            `;
            qDB.forEach((q, i) => {
                html += `<div class="key-item"><b>Q${i+1}.</b> ${labels[q.ans]}</div>`;
            });
            html += `</div></div>`;

            mainContent.innerHTML = html;
        });
    </script>
</body>
</html>
